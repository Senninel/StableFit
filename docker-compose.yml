services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stablefit}
      POSTGRES_USER: ${POSTGRES_USER:-stablefit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stablefit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stablefit_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/StableFit.API/Dockerfile
    restart: unless-stopped
    ports:
      - "5225:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-stablefit}
      - POSTGRES_USER=${POSTGRES_USER:-stablefit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stablefit}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/StableFit.Web/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      - api

volumes:
  stablefit_db:
