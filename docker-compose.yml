services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stablefit}
      POSTGRES_USER: ${POSTGRES_USER:-stablefit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stablefit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stablefit_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stablefit_db:
